name: 'Insights.com Upgrade'

on:
    workflow_dispatch:
        inputs:
            package_name:
                type: choice
                description: 'Package name to upgrade'
                required: true
                options:
                    - '@hanzo/types'
            package_version:
                description: 'Package version to upgrade to'
                required: true
                type: string

permissions:
    contents: read

jobs:
    insights-com-upgrade:
        name: Upgrade Insights.com Package
        runs-on: ubuntu-latest

        steps:
            - name: Get upgrader token
              id: upgrader
              uses: getsentry/action-github-app-token@97c9e23528286821f97fba885c1b1123284b29cc # v2
              with:
                  app_id: ${{ secrets.GH_APP_INSIGHTS_JS_UPGRADER_APP_ID }}
                  private_key: ${{ secrets.GH_APP_INSIGHTS_JS_UPGRADER_PRIVATE_KEY }}

            - name: Check out Insights.com repo
              uses: actions/checkout@v6
              with:
                  repository: 'Insights/insights.hanzo.ai'
                  token: ${{ steps.upgrader.outputs.token }}

            - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # pin v4.2.0

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install new package version in Insights.com repo
              id: pnpm-upgrade
              shell: bash
              env:
                  RETRY_TIMES: 20
                  RETRY_WAIT_SECONDS: 5
                  PACKAGE_NAME: ${{ github.event.inputs.package_name }}
                  PACKAGE_VERSION: ${{ github.event.inputs.package_version }}
              run: |
                  OUTGOING_VERSION=$(jq ".dependencies[\"$PACKAGE_NAME\"]" package.json -r)
                  echo "outgoing-version=$OUTGOING_VERSION" >> "$GITHUB_OUTPUT"
                  for i in $(seq 1 $RETRY_TIMES); do
                      # Retry loop because of npm being _eventually_ consistent
                      if pnpm -r upgrade "$PACKAGE_NAME@$PACKAGE_VERSION"; then
                          break
                      else
                          [ $i -ne $RETRY_TIMES ] && sleep $RETRY_WAIT_SECONDS || false
                      fi
                  done

            - name: Generate branch name
              id: generate-branch-name
              shell: bash
              env:
                  PACKAGE_NAME: ${{ github.event.inputs.package_name }}
                  PACKAGE_VERSION: ${{ github.event.inputs.package_version }}
              run: |
                  PACKAGE_NAME_SANITIZED=$(echo "$PACKAGE_NAME" | sed 's/@//g' | sed 's/\//-/g')
                  echo "branch_name=${PACKAGE_NAME_SANITIZED}-$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

            - name: Create Insights.com repo pull request
              id: com-repo-pr
              uses: peter-evans/create-pull-request@98357b18bf14b5342f975ff684046ec3b2a07725 # v8.0.0
              with:
                  token: ${{ steps.upgrader.outputs.token }}
                  commit-message: 'chore(deps): Update ${{ github.event.inputs.package_name }} to ${{ github.event.inputs.package_version }}'
                  branch: ${{ steps.generate-branch-name.outputs.branch_name }}
                  delete-branch: true
                  title: 'chore(deps): Update ${{ github.event.inputs.package_name }} to ${{ github.event.inputs.package_version }}'
                  body: |
                      ## Changes

                      ${{ github.event.inputs.package_name }} version ${{ github.event.inputs.package_version }} has been released. This updates Insights.com to use it.

                      https://github.com/hanzoai/@hanzo/insights/compare/${{ github.event.inputs.package_name }}@${{ steps.pnpm-upgrade.outputs.outgoing-version }}...${{ github.event.inputs.package_name }}@${{ github.event.inputs.package_version }} • [GitHub releases](https://github.com/hanzoai/@hanzo/insights/releases) • [npm releases](https://www.npmjs.com/package/${{ github.event.inputs.package_name }}?activeTab=version)

            - name: Output pull request result
              shell: bash
              env:
                  PACKAGE_NAME: ${{ github.event.inputs.package_name }}
                  PACKAGE_VERSION: ${{ github.event.inputs.package_version }}
                  PR_URL: ${{ steps.com-repo-pr.outputs.pull-request-url }}
              run: |
                  echo "Insights.com pull request for $PACKAGE_NAME version $PACKAGE_VERSION ready: $PR_URL"

            - name: Enable automerge
              env:
                  GH_TOKEN: ${{ steps.upgrader.outputs.token }}
                  PR_NUMBER: ${{ steps.com-repo-pr.outputs.pull-request-number }}
              run: |
                  gh pr merge "$PR_NUMBER" --auto --squash

            # https://us.insights.hanzo.ai/project/11213/functions/019ae9c0-03ee-0000-2f32-971f64be8ffe
            - name: Send failure event to Insights
              if: ${{ failure() }}
              uses: Insights/insights-github-action@v0.1
              with:
                  insights-token: '${{ secrets.INSIGHTS_PROJECT_API_KEY }}'
                  event: '@hanzo/insights-github-release-workflow-failure'
                  properties: >-
                      {
                        "commitSha": "${{ github.sha }}",
                        "jobStatus": "${{ job.status }}",
                        "ref": "${{ github.ref }}",
                        "repository": "Insights/insights.hanzo.ai",
                        "packageName": "${{ github.event.inputs.package_name }}",
                        "packageVersion": "${{ github.event.inputs.package_version }}"
                      }
